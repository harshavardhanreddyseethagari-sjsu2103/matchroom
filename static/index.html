<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Room — Live Watch Party Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B0D0F;
    --panel: #14171A;
    --panel-border: #232830;
    --text-primary: #E8E9EA;
    --text-secondary: #8A9099;
    --text-tertiary: #565C66;
    --accent: #FF6B35;
    --live: #3DCB7A;
    --bubble-other: #1C2025;
    --bubble-self: #1F2937;
    --grid-line: #1C2025;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── JOIN SCREEN ───────────────────────────────────────── */
  #join-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 420px;
    padding: 40px 32px;
  }

  #join-screen .brand {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  #join-screen h1 {
    font-size: 28px;
    font-weight: 700;
    margin: 0 0 6px;
    text-align: center;
  }

  #join-screen .subtitle {
    color: var(--text-secondary);
    font-size: 14px;
    margin-bottom: 32px;
    text-align: center;
  }

  .field-group { width: 100%; margin-bottom: 16px; }

  .field-group label {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-tertiary);
    margin-bottom: 6px;
  }

  .field-group input {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    color: var(--text-primary);
    padding: 12px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    border-radius: 6px;
    outline: none;
  }

  .field-group input:focus { border-color: var(--accent); }

  .quick-rooms {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }

  .quick-room-btn {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    color: var(--text-secondary);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 100px;
    cursor: pointer;
  }

  .quick-room-btn:hover { border-color: var(--accent); color: var(--text-primary); }

  .join-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 8px;
  }

  .join-btn:active { opacity: 0.85; }

  .join-error {
    color: var(--accent);
    font-size: 12px;
    margin-top: 10px;
    font-family: 'IBM Plex Mono', monospace;
    display: none;
  }

  /* ── CHAT SCREEN ───────────────────────────────────────── */
  #chat-screen {
    display: none;
    width: 100%;
    max-width: 560px;
    height: 100vh;
    flex-direction: column;
  }

  .chat-header {
    border-bottom: 1px solid var(--panel-border);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .chat-header .room-name {
    font-size: 15px;
    font-weight: 600;
  }

  .chat-header .room-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 2px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--live);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .live-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--live);
    animation: pulse 1.6s infinite ease-in-out;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(61, 203, 122, 0.5); }
    50% { opacity: 0.7; box-shadow: 0 0 0 5px rgba(61, 203, 122, 0); }
  }

  #message-log {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .msg-system {
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-tertiary);
    margin: 4px 0;
  }

  .msg-row {
    display: flex;
    flex-direction: column;
    max-width: 78%;
  }

  .msg-row.self { align-self: flex-end; align-items: flex-end; }
  .msg-row.other { align-self: flex-start; align-items: flex-start; }

  .msg-username {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-tertiary);
    margin-bottom: 3px;
    padding: 0 4px;
  }

  .msg-bubble {
    padding: 9px 13px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.4;
    word-break: break-word;
  }

  .msg-row.self .msg-bubble {
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 3px;
  }

  .msg-row.other .msg-bubble {
    background: var(--bubble-other);
    color: var(--text-primary);
    border-bottom-left-radius: 3px;
  }

  .input-bar {
    border-top: 1px solid var(--panel-border);
    padding: 16px 24px;
    display: flex;
    gap: 10px;
  }

  .input-bar input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    color: var(--text-primary);
    padding: 11px 14px;
    border-radius: 20px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
  }

  .input-bar input:focus { border-color: var(--accent); }

  .send-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  #message-log::-webkit-scrollbar { width: 6px; }
  #message-log::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 3px; }
</style>
</head>
<body>

<div id="join-screen">
  <div class="brand">● live watch party chat</div>
  <h1>Match Room</h1>
  <p class="subtitle">Join a room, talk live with everyone watching the same match.</p>

  <div class="field-group">
    <label>Room / Match</label>
    <input type="text" id="roomInput" placeholder="e.g. lakers-vs-celtics" autocomplete="off">
    <div class="quick-rooms">
      <button class="quick-room-btn" onclick="setRoom('lakers-vs-celtics')">Lakers vs Celtics</button>
      <button class="quick-room-btn" onclick="setRoom('world-cup-final')">World Cup Final</button>
      <button class="quick-room-btn" onclick="setRoom('superbowl-watch')">Super Bowl Watch</button>
    </div>
  </div>

  <div class="field-group">
    <label>Username</label>
    <input type="text" id="usernameInput" placeholder="Your name" autocomplete="off">
  </div>

  <button class="join-btn" onclick="joinRoom()">Join room</button>
  <div class="join-error" id="join-error"></div>
</div>

<div id="chat-screen">
  <div class="chat-header">
    <div>
      <div class="room-name" id="room-title">Room</div>
      <div class="room-meta" id="participant-count">0 watching</div>
    </div>
    <div class="live-badge"><span class="live-dot"></span>live</div>
    <button onclick="leaveRoom()" style="background:none; border:1px solid var(--panel-border); color: var(--text-secondary); font-family:'IBM Plex Mono',monospace; font-size:11px; padding:6px 10px; border-radius:6px; cursor:pointer; margin-left:12px;">Leave</button>
  </div>

  <div id="message-log"></div>

  <div id="typing-indicator" style="display:none; padding: 0 24px 8px; font-size: 12px; color: var(--text-tertiary); font-family: 'IBM Plex Mono', monospace;"></div>

  <div class="input-bar">
    <input type="text" id="messageInput" placeholder="Send a message..."
      onkeydown="if(event.key==='Enter') sendMessage()"
      oninput="handleTyping()">
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<div id="participants-panel" style="display:none; position: fixed; top: 18px; right: 18px; background: var(--panel); border: 1px solid var(--panel-border); border-radius: 8px; padding: 14px 16px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; max-width: 200px;">
  <div style="color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; font-size: 10px; margin-bottom: 8px;">Watching now</div>
  <div id="participants-list"></div>
</div>

<script>
  let socket = null;
  let myUsername = null;
  let participantCount = 0;

  function setRoom(name) {
    document.getElementById("roomInput").value = name;
  }

  function joinRoom() {
    const room = document.getElementById("roomInput").value.trim();
    const username = document.getElementById("usernameInput").value.trim();
    const errEl = document.getElementById("join-error");

    if (!room || !username) {
      errEl.textContent = "Enter both a room and a username.";
      errEl.style.display = "block";
      return;
    }

    // Remember this room/username so a page refresh can skip straight
    // back to the chat screen. sessionStorage is scoped PER TAB — each
    // browser tab gets its own independent copy, which is what we want
    // when testing/using multiple users at once in separate tabs.
    // (localStorage would be shared across ALL tabs on this site —
    // that's what caused two tabs to "merge" into one identity.)
    sessionStorage.setItem("matchroom_room", room);
    sessionStorage.setItem("matchroom_username", username);

    connectToRoom(room, username);
  }

  function connectToRoom(room, username) {
    const errEl = document.getElementById("join-error");
    myUsername = username;
    const wsProtocol = window.location.protocol === "https:" ? "wss:" : "ws:";
    const wsUrl = wsProtocol + "//" + window.location.host + "/ws/"
                  + encodeURIComponent(room) + "/" + encodeURIComponent(username);

    socket = new WebSocket(wsUrl);

    socket.onopen = () => {
      document.getElementById("join-screen").style.display = "none";
      document.getElementById("chat-screen").style.display = "flex";
      document.getElementById("participants-panel").style.display = "block";
      document.getElementById("room-title").textContent = room.replace(/-/g, " ");
    };

    socket.onmessage = (event) => {
      const data = JSON.parse(event.data);
      handleMessage(data);
    };

    socket.onclose = () => {
      appendSystemMessage("Disconnected from server.");
    };

    socket.onerror = () => {
      errEl.textContent = "Could not connect. Try again.";
      errEl.style.display = "block";
    };
  }

  function leaveRoom() {
    // Explicit "leave" action — clears the saved session so refreshing
    // afterward correctly returns to the join screen instead of
    // reconnecting to a room you intentionally left.
    sessionStorage.removeItem("matchroom_room");
    sessionStorage.removeItem("matchroom_username");
    if (socket) socket.close();
    location.reload();
  }

  // On page load: check if we have a saved room/username. If so, skip
  // the join screen entirely and reconnect automatically.
  window.addEventListener("DOMContentLoaded", () => {
    const savedRoom = sessionStorage.getItem("matchroom_room");
    const savedUsername = sessionStorage.getItem("matchroom_username");
    if (savedRoom && savedUsername) {
      connectToRoom(savedRoom, savedUsername);
    }
  });

  function handleMessage(data) {
    if (data.type === "history") {
      data.messages.forEach(msg => appendChatMessage(msg.username, msg.text, msg.message_id, msg.reactions));
    } else if (data.type === "system") {
      appendSystemMessage(data.text);
      if (typeof data.participant_count === "number") {
        participantCount = data.participant_count;
        updateParticipantCount();
      }
      if (Array.isArray(data.participants)) {
        renderParticipants(data.participants);
      }
    } else if (data.type === "chat") {
      appendChatMessage(data.username, data.text, data.message_id, data.reactions);
    } else if (data.type === "reaction_update") {
      updateReactionsOnMessage(data.message_id, data.reactions);
    } else if (data.type === "typing") {
      if (data.username !== myUsername) {
        typingUsers.add(data.username);
        updateTypingIndicator();
      }
    } else if (data.type === "stop_typing") {
      typingUsers.delete(data.username);
      updateTypingIndicator();
    }
  }

  function renderParticipants(names) {
    const list = document.getElementById("participants-list");
    list.innerHTML = names.map(n =>
      `<div style="padding: 3px 0; color: ${n === myUsername ? 'var(--accent)' : 'var(--text-secondary)'}">${n}${n === myUsername ? ' (you)' : ''}</div>`
    ).join("");
  }

  let typingUsers = new Set();

  function updateTypingIndicator() {
    const el = document.getElementById("typing-indicator");
    const names = Array.from(typingUsers);
    if (names.length === 0) {
      el.style.display = "none";
      return;
    }
    el.style.display = "block";
    el.textContent = names.length === 1
      ? `${names[0]} is typing...`
      : `${names.join(", ")} are typing...`;
  }

  let typingTimeout = null;

  function handleTyping() {
    if (!socket) return;
    // Tell the server we started typing
    socket.send(JSON.stringify({ type: "typing" }));

    // Reset the "stop typing" timer every keystroke. If 1.5s pass with
    // no new keystroke, we tell the server we've stopped. This avoids
    // sending a "typing"/"stop_typing" message on literally every
    // single keystroke pair, which would flood the connection.
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      socket.send(JSON.stringify({ type: "stop_typing" }));
    }, 1500);
  }

  function updateParticipantCount() {
    const el = document.getElementById("participant-count");
    el.textContent = participantCount + (participantCount === 1 ? " watching" : " watching");
  }

  function appendSystemMessage(text) {
    const log = document.getElementById("message-log");
    const div = document.createElement("div");
    div.className = "msg-system";
    div.textContent = text;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }

  const REACTION_EMOJIS = ["🔥", "😬", "👏", "😂"];

  function appendChatMessage(username, text, messageId, reactions) {
    const log = document.getElementById("message-log");
    const isSelf = username === myUsername;

    const row = document.createElement("div");
    row.className = "msg-row " + (isSelf ? "self" : "other");
    if (messageId) row.dataset.messageId = messageId;

    if (!isSelf) {
      const nameEl = document.createElement("div");
      nameEl.className = "msg-username";
      nameEl.textContent = username;
      row.appendChild(nameEl);
    }

    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    bubble.textContent = text;
    row.appendChild(bubble);

    // Reaction picker — small row of emoji buttons under the bubble.
    // Only rendered if this message has an ID (history replay before
    // this feature existed won't have one — handled gracefully).
    if (messageId) {
      const reactionBar = document.createElement("div");
      reactionBar.className = "reaction-bar";
      reactionBar.style.cssText = "display:flex; gap:4px; margin-top:4px; flex-wrap:wrap;";
      row.appendChild(reactionBar);
      renderReactions(reactionBar, messageId, reactions || {});
    }

    log.appendChild(row);
    log.scrollTop = log.scrollHeight;
  }

  function renderReactions(barEl, messageId, reactions) {
    barEl.innerHTML = "";

    // Show existing reaction counts (only emojis with at least 1 reactor)
    Object.entries(reactions).forEach(([emoji, users]) => {
      const pill = document.createElement("button");
      const reactedByMe = users.includes(myUsername);
      pill.textContent = `${emoji} ${users.length}`;
      pill.style.cssText = `font-size:11px; padding:2px 8px; border-radius:10px; cursor:pointer; border:1px solid ${reactedByMe ? 'var(--accent)' : 'var(--panel-border)'}; background:${reactedByMe ? 'rgba(255,107,53,0.15)' : 'var(--panel)'}; color:var(--text-primary); font-family:'IBM Plex Mono',monospace;`;
      pill.onclick = () => sendReaction(messageId, emoji);
      barEl.appendChild(pill);
    });

    // Always show a "+" picker to add a NEW reaction not yet present
    const addBtn = document.createElement("button");
    addBtn.textContent = "+";
    addBtn.style.cssText = "font-size:11px; padding:2px 8px; border-radius:10px; cursor:pointer; border:1px dashed var(--panel-border); background:none; color:var(--text-tertiary); font-family:'IBM Plex Mono',monospace;";
    addBtn.onclick = () => {
      const picker = document.createElement("div");
      picker.style.cssText = "display:flex; gap:4px; margin-top:4px;";
      REACTION_EMOJIS.forEach(emoji => {
        const btn = document.createElement("button");
        btn.textContent = emoji;
        btn.style.cssText = "font-size:14px; padding:2px 6px; border-radius:8px; cursor:pointer; border:1px solid var(--panel-border); background:var(--panel);";
        btn.onclick = () => { sendReaction(messageId, emoji); picker.remove(); };
        picker.appendChild(btn);
      });
      barEl.appendChild(picker);
    };
    barEl.appendChild(addBtn);
  }

  function sendReaction(messageId, emoji) {
    if (!socket) return;
    socket.send(JSON.stringify({ type: "reaction", message_id: messageId, emoji: emoji }));
  }

  function updateReactionsOnMessage(messageId, reactions) {
    const row = document.querySelector(`[data-message-id="${messageId}"]`);
    if (!row) return;
    const bar = row.querySelector(".reaction-bar");
    if (bar) renderReactions(bar, messageId, reactions);
  }

  function sendMessage() {
    const input = document.getElementById("messageInput");
    const text = input.value.trim();
    if (!text || !socket) return;
    socket.send(JSON.stringify({ type: "chat", text: text }));
    input.value = "";

    // Sending a real message implies typing has stopped — clear it
    // immediately rather than waiting for the 1.5s timeout.
    clearTimeout(typingTimeout);
    socket.send(JSON.stringify({ type: "stop_typing" }));
  }
</script>

</body>
</html>
